name: Deploy (Azure App Service + Postgres Flexible + Redis Cache)
on: { workflow_dispatch: {} }
permissions: { contents: read }
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Phase 1 — infra (RG, ACR, Postgres, Redis, plan; no web app yet)
        working-directory: infra
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve -var "subscription_id=$ARM_SUBSCRIPTION_ID"
          echo "ACR=$(terraform output -raw acr_login_server)" >> "$GITHUB_ENV"
      - uses: azure/login@v2
        with: { creds: '${{ secrets.AZURE_CREDENTIALS }}' }
      - name: Build + push image to ACR
        run: |
          REG="${ACR%%.*}"
          az acr build --registry "$REG" --image "ttt/app:${GITHUB_SHA::8}" .
          echo "IMG=ttt/app:${GITHUB_SHA::8}" >> "$GITHUB_ENV"
      - name: Phase 2 — web app (with the image)
        working-directory: infra
        run: |
          terraform apply -input=false -auto-approve \
            -var "subscription_id=$ARM_SUBSCRIPTION_ID" -var "image=$IMG"
          URL=$(terraform output -raw url)
          echo "Deployed: $URL"; echo "$URL" > "$GITHUB_WORKSPACE/deployed_url.txt"
      - uses: actions/upload-artifact@v4
        with: { name: deployed-url, path: deployed_url.txt }
