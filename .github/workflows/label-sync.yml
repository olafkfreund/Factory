name: Label sync

# Reconcile this repo's labels with the canonical set in .github/labels.yml
# (RFC-0011). Runs when the manifest changes and on demand. GitLab/ADO are
# synced out-of-band by scripts/sync_labels.py (they have no equivalent action).

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
      - ".github/workflows/label-sync.yml"
  workflow_dispatch:
    inputs:
      prune:
        description: "Delete labels not present in labels.yml"
        type: boolean
        default: false

permissions:
  issues: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Sync labels from manifest
        # micnncim/action-label-syncer@v1.3.0
        uses: micnncim/action-label-syncer@3abd5ab72fda571e69fffd97bd4e0033dd5f495c
        with:
          manifest: .github/labels.yml
          # Default to non-destructive; opt into prune via workflow_dispatch.
          prune: ${{ github.event_name == 'workflow_dispatch' && inputs.prune || false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
