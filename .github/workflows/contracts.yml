name: factory-contracts (staleness gate)

# Single-source-of-truth gate for the generated factory-contracts package
# (epic Factory#154, issue Factory#160).
#
# WHAT THIS PROTECTS
# ------------------
# shared/factory-contracts/{python,ts} is GENERATED by scripts/gen_contracts.py
# from the canonical inputs:
#   - apis/completion-events.asyncapi.yaml  (RFC-0001 CompletionEvent + Usage)
#   - apis/status-taxonomy.json             (canonical lifecycle token sets)
# and COMMITTED so consumers (CFactory and the other factories) can pin a known
# version. If someone edits a token set or a schema field but forgets to rerun
# the generator and recommit, the committed output silently drifts from its
# inputs and every pinned consumer keeps reading the stale shape. This job fails
# the PR when that happens.
#
# WHY BLOCKING (not advisory like jscpd)
# --------------------------------------
# Regeneration is mechanical and deterministic (`python scripts/gen_contracts.py`
# rewrites the output byte-for-byte). There is no legacy backlog to grandfather:
# the committed output is either in sync with the inputs or it is not. So this is
# a hard gate from day one.

on:
  pull_request:
    paths:
      - "apis/completion-events.asyncapi.yaml"
      - "apis/status-taxonomy.json"
      - "scripts/gen_contracts.py"
      - "shared/factory-contracts/**"
      - "tests/test_gen_contracts.py"
      - ".github/workflows/contracts.yml"
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staleness:
    name: committed output matches inputs (--check, blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: gen_contracts --check (fail if committed output is stale)
        # The generator is dependency-free; --check compares the committed
        # output against a fresh render and exits non-zero on any drift.
        run: python scripts/gen_contracts.py --check

  self-test:
    name: generated package self-test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        # pydantic is required only by the generated module (the generator and
        # the staleness check above are dependency-free). The self-test imports
        # the generated package, so it is installed here.
        run: pip install pytest "pydantic>=2"

      - name: Run the contracts self-test
        run: pytest -v tests/test_gen_contracts.py
