name: PARR nightly regression

# Phase 1 of the make-it-great plan (Factory#41): drive the deployed PARR fleet
# nightly and fail loudly at any cross-service boundary. The June 2026 review
# found that nearly every production bug lived at a factory *seam* — the class
# unit tests can't see. This catches them with a gate instead of a user.
#
# Factory#44: the job logic now lives in the reusable workflow parr-regression.yml
# (on: workflow_call) so the same gate can also run pre-merge / post-deploy in the
# service repos. This file is a thin scheduled caller — behavior is unchanged.

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC nightly
  workflow_dispatch:
    inputs:
      full:
        description: "Also drive a real build lifecycle end-to-end (slow)"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  nightly:
    uses: ./.github/workflows/parr-regression.yml
    with:
      mode: ${{ inputs.full && 'full' || 'smoke' }}
      open_issue_on_failure: true
    secrets:
      FACTORY_TOKEN: ${{ secrets.FACTORY_TOKEN }}
