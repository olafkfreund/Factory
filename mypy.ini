; Factory hub mypy config.
;
; Factory is the baseline OWNER of standards/mypy.ini (the fleet single source of
; truth, standards/coding-standards.md section 1.2). mypy.ini has no extend/
; inherit mechanism, so the strict bar is reproduced here verbatim from the
; canonical baseline; a config-lint / drift gate keeps this in sync with
; standards/mypy.ini. Per the standard, the hub may only TIGHTEN, never loosen.

[mypy]
python_version = 3.11
strict = True
; strict implies the following; spelled out so the contract is visible and a
; service cannot quietly weaken one of them:
disallow_untyped_defs = True
disallow_any_generics = True
disallow_incomplete_defs = True
check_untyped_defs = True
warn_return_any = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
no_implicit_reexport = True
; Boundaries must be typed (section 1.7); surface Any leaks rather than hide them.
disallow_subclassing_any = True
extra_checks = True
