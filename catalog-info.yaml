    CFactory's ingress by webhook (or COMPLETED.json sentinel).
  tags:
    - asyncapi
    - events
    - rfc-0001
  links:
    - url: https://factory.freundcloud.com/rfc/correlation-key/
      title: RFC-0001 (authoritative)
      icon: docs
