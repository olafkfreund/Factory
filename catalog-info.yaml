# Backstage software-catalog descriptor for the Factory program/meta repo.
# Hand-maintained (supersedes the auto-generated stub from the catalog-onboard
# workflow). Factory is a documentation / program repository — it has NO services
# and NO REST API of its own; it is the meta-repo that threads the four products
# (PFactory · AIFactory · TFactory · CFactory) into one PARR pipeline.
#
# This single file is self-contained (the validator and Backstage read it whole):
#   * Component `factory`     — this documentation repo (no API of its own)
#   * System    `factory-suite` — groups the family
#   * Components pfactory / aifactory / tfactory / cfactory — the four products,
#     each a subcomponent of `factory`, wired by the PARR handoff chain
#   * 9 API entities — 4 REST (openapi) · 1 completion-event contract (asyncapi)
#     · 4 MCP control planes (mcp); definitions embedded from ./apis via $text
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: factory
  title: Factory
  description: >-
    Program/meta repository for the Factory suite (PFactory · AIFactory · TFactory ·
    CFactory). Cross-cutting plans, epics, RFCs and the PARR pipeline that spans all
    products. Documentation-only: no services, no API of its own — the four product
    Components below carry the services and APIs.
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: olafkfreund/Factory
    backstage.io/source-location: url:https://github.com/olafkfreund/Factory/
  tags:
    - documentation
    - program
    - parr
    - governance
    - agentic-sdlc
  links:
    - url: https://factory.freundcloud.com/
      title: Website
      icon: web
    - url: https://factory.freundcloud.com/why/
      title: Why Factory
      icon: docs
    - url: https://factory.freundcloud.com/rfc/correlation-key/
      title: RFC-0001 — Correlation Key & Completion Event
      icon: docs
    - url: https://github.com/users/olafkfreund/projects/1
      title: Factory Program board
      icon: dashboard
spec:
  type: documentation
  lifecycle: production
  owner: olafkfreund
  # Grouped under the suite System (Domain is rejected by the catalog rules).
  system: factory-suite
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: factory-suite
  title: Factory suite
  description: >-
    Four composable products implementing the PARR loop (Prepare · Act · Reflect ·
    Review): PFactory plans, AIFactory builds, TFactory verifies, CFactory observes
    & steers — plus the Factory program/meta repo that threads them together.
  annotations:
    factory.io/github-agentic-rfc: https://factory.freundcloud.com/rfc/github-agentic/
    factory.io/github-agentic-design: https://github.com/olafkfreund/AIFactory/blob/dev/docs/plans/2026-06-07-github-agentic-integration-design.md
    factory.io/github-agentic-mcp-endpoints: "aifactory=:3101/mcp, tfactory=:3103/mcp, pfactory=:3114/mcp"
    factory.io/github-agentic-models-catalog: https://models.github.ai/catalog/models
    factory.io/github-agentic-labels: "copilot:delegate, aifactory:run, aifactory:review, pfactory:run, tfactory:run"
  tags:
    - parr
    - agentic-sdlc
    - github-agentic
  links:
    - url: https://factory.freundcloud.com/
      title: Website
      icon: web
spec:
  owner: olafkfreund
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: pfactory
  title: PFactory
  description: >-
    Prepare / Plan + Review. Governed planning grounded in live cloud/Backstage
    context; review gates with citations (architecture, security, best-practices,
    feasibility); human approval → governed GitHub issues. Backend on :3114.
  annotations:
    backstage.io/techdocs-ref: url:https://github.com/olafkfreund/PFactory/tree/main
    github.com/project-slug: olafkfreund/PFactory
    backstage.io/source-location: url:https://github.com/olafkfreund/PFactory/
  tags:
    - python
    - fastapi
    - mcp
    - planning
    - parr-prepare
  links:
    - url: https://github.com/olafkfreund/PFactory
      title: Source
      icon: github
spec:
  type: service
  lifecycle: experimental
  owner: olafkfreund
  system: factory-suite
  subcomponentOf: factory
  providesApis:
    - pfactory-api
    - pfactory-mcp
    - factory-task-contract
  consumesApis:
    - factory-completion-events
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: aifactory
  title: AIFactory
  description: >-
    Act. Spec-first plan → code → QA in isolated git worktrees; multi-provider
    (Claude, OpenAI, Gemini, Ollama, vLLM, Codex, Copilot CLI); can delegate to
    other coding agents. Enterprise auth (SAML/SCIM), HMAC-anchored audit, LiteLLM
    gateway. Backend on :3101.
  annotations:
    backstage.io/techdocs-ref: url:https://github.com/olafkfreund/AIFactory/tree/dev
    github.com/project-slug: olafkfreund/AIFactory
    backstage.io/source-location: url:https://github.com/olafkfreund/AIFactory/
  tags:
    - python
    - fastapi
    - mcp
    - claude-agent-sdk
    - parr-act
  links:
    - url: https://github.com/olafkfreund/AIFactory
      title: Source
      icon: github
spec:
  type: service
  lifecycle: experimental
  owner: olafkfreund
  system: factory-suite
  subcomponentOf: factory
  dependsOn:
    - component:pfactory
  providesApis:
    - aifactory-api
    - aifactory-mcp
  consumesApis:
    - factory-completion-events
    - factory-task-contract
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: tfactory
  title: TFactory
  description: >-
    Reflect / Verify. Autonomous test generation + execution in a Docker sandbox,
    graded on a 5-signal verdict (coverage delta, stability, mutation, lint,
    semantic relevance). Lanes: unit, browser, API, integration, mutation. Routes a
    handback to AIFactory's QA fixer when tests fail. Backend on :3103.
  annotations:
    backstage.io/techdocs-ref: url:https://github.com/olafkfreund/TFactory/tree/dev
    github.com/project-slug: olafkfreund/TFactory
    backstage.io/source-location: url:https://github.com/olafkfreund/TFactory/
  tags:
    - python
    - fastapi
    - mcp
    - testing
    - parr-reflect
  links:
    - url: https://github.com/olafkfreund/TFactory
      title: Source
      icon: github
spec:
  type: service
  lifecycle: experimental
  owner: olafkfreund
  system: factory-suite
  subcomponentOf: factory
  dependsOn:
    - component:aifactory
  providesApis:
    - tfactory-api
    - tfactory-mcp
  consumesApis:
    - factory-completion-events
    - factory-task-contract
    - aifactory-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: cfactory
  title: CFactory
  description: >-
    Review / Observe — the control tower. One cockpit threading plan → code → test
    via a WorkItem correlation store keyed by the GitHub issue number, plus an
    advise-and-confirm agentic copilot. Pure consumer: observes through the other
    services' REST/WS APIs and the RFC-0001 completion-event webhook; only writes
    through human-confirmed actions. API :3110 / stream :3111.
  annotations:
    backstage.io/techdocs-ref: url:https://github.com/olafkfreund/CFactory/tree/main
    github.com/project-slug: olafkfreund/CFactory
    backstage.io/source-location: url:https://github.com/olafkfreund/CFactory/
  tags:
    - python
    - fastapi
    - claude-agent-sdk
    - observability
    - parr-review
  links:
    - url: https://github.com/olafkfreund/CFactory
      title: Source
      icon: github
spec:
  type: service
  lifecycle: experimental
  owner: olafkfreund
  system: factory-suite
  subcomponentOf: factory
  dependsOn:
    - component:pfactory
    - component:aifactory
    - component:tfactory
  providesApis:
    - cfactory-api
    - factory-completion-events
    - cfactory-mcp
  consumesApis:
    - pfactory-api
    - aifactory-api
    - tfactory-api
---
