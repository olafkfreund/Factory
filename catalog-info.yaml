---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: factory-task-contract
  title: Factory Task Contract v2 (RFC-0002)
  description: >-
    The canonical, signed task contract carrying WHAT (plan) + HOW (execution
    profile) + VERIFY (tfactory test profile). PFactory computes it once and
    emits it; AIFactory executes without re-planning; TFactory tests without
    guessing. Builds on the RFC-0001 correlation key.
  tags:
    - json-schema
    - contract
    - rfc-0002
  links:
    - url: https://factory.freundcloud.com/rfc/task-contract/
      title: RFC-0002 (authoritative)
      icon: docs
spec:
  type: json-schema
  lifecycle: production
  owner: olafkfreund
  system: factory-suite
  definition:
    $text: ./apis/task-contract.schema.json
