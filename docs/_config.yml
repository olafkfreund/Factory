title: Factory
description: A governed, verified, observable autonomous software factory — PFactory plans it, AIFactory builds it, TFactory verifies it, and CFactory watches over all three. Four composable products, one PARR pipeline.

# Keep the remote theme reference so the legacy Pages auto-builder is happy,
# but override its layout via _layouts/default.html (local layouts always win).
remote_theme: pages-themes/cayman@v0.2.0

plugins:
  - jekyll-remote-theme
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

permalink: /blog/:year/:month/:day/:title/
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

show_downloads: false

exclude:
  - vendor/
  - Gemfile
  - Gemfile.lock

repo_url: https://github.com/olafkfreund/Factory
