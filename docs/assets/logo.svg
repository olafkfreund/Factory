<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Factory">
  <title>Factory</title>
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- badge -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#fg)"/>
  <!-- pipeline connectors: P -> A -> T, with the control tower above -->
  <g stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" fill="none">
    <path d="M16 42 H48"/>
    <path d="M32 42 V25"/>
  </g>
  <!-- three pipeline nodes (Plan / Act / Verify) -->
  <g fill="#ffffff">
    <circle cx="16" cy="42" r="4.4"/>
    <circle cx="32" cy="42" r="4.4"/>
    <circle cx="48" cy="42" r="4.4"/>
    <!-- overseer node: the control tower watching the pipeline -->
    <circle cx="32" cy="22" r="7.2"/>
  </g>
  <!-- aperture in the overseer node -->
  <circle cx="32" cy="22" r="3" fill="url(#fg)"/>
</svg>
