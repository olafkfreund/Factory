<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="CFactory">
  <title>CFactory</title>
  <!-- CFactory: a radar scope on Gruvbox bg0 — the control tower watching the pipeline -->
  <defs>
    <radialGradient id="sweep" cx="32" cy="32" r="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8ec07c" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8ec07c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- badge -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="#282828"/>
  <!-- radar rings + crosshair (gruvbox blue) -->
  <g fill="none" stroke="#83a598" stroke-linecap="round">
    <circle cx="32" cy="32" r="19" stroke-opacity="0.55" stroke-width="2"/>
    <circle cx="32" cy="32" r="11" stroke-opacity="0.40" stroke-width="2"/>
    <path d="M13 32 H51 M32 13 V51" stroke-opacity="0.22" stroke-width="1.6"/>
  </g>
  <!-- sweep wedge (straight-up clockwise to up-right) -->
  <path d="M32 32 L32 13 A19 19 0 0 1 47.6 22.6 Z" fill="url(#sweep)"/>
  <!-- bright leading edge of the sweep (gruvbox bright aqua) -->
  <path d="M32 32 L47.6 22.6" stroke="#8ec07c" stroke-width="2.4" stroke-linecap="round"/>
  <!-- monitored blips (the pipeline being watched) -->
  <g fill="#ebdbb2">
    <circle cx="32" cy="32" r="2.6"/>
    <circle cx="21" cy="41" r="2.2" fill-opacity="0.80"/>
    <circle cx="43" cy="42" r="2.2" fill-opacity="0.80"/>
  </g>
  <!-- active blip near the sweep (gruvbox bright yellow) with halo -->
  <circle cx="41" cy="24" r="4.8" fill="#fabd2f" fill-opacity="0.22"/>
  <circle cx="41" cy="24" r="2.7" fill="#fabd2f"/>
</svg>
