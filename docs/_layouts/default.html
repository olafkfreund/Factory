<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#282828">
  <meta name="color-scheme" content="dark">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <link rel="icon" type="image/svg+xml" href="{{ '/assets/logo.svg' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16x16.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">
  <meta name="og:image" content="{{ '/assets/icon-512.png' | absolute_url }}">

  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/factory.css' | relative_url }}">
</head>
<body>
  <div class="bg-mesh" aria-hidden="true">
    <div class="bg-mesh__glow bg-mesh__glow--violet"></div>
    <div class="bg-mesh__glow bg-mesh__glow--cyan"></div>
    <div class="bg-mesh__grid"></div>
  </div>

  <nav class="topnav" role="banner" aria-label="Primary">
    <div class="container topnav-inner">
      <a class="brand" href="{{ '/' | relative_url }}"><img class="brand-logo" src="{{ '/assets/logo.svg' | relative_url }}" alt="" width="26" height="26" aria-hidden="true">Factory</a>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a></li>
        <li><a href="{{ '/why/' | relative_url }}"{% if page.url contains '/why/' %} class="active"{% endif %}>Why Factory</a></li>
        <li><a href="{{ '/#products' | relative_url }}">Products</a></li>
        <li><a href="{{ '/#cooperation' | relative_url }}">Cooperation</a></li>
        <li><a href="{{ '/roadmap/' | relative_url }}"{% if page.url contains '/roadmap/' %} class="active"{% endif %}>Roadmap</a></li>
        <li><a href="{{ '/blog/' | relative_url }}"{% if page.url contains '/blog' %} class="active"{% endif %}>Blog</a></li>
        <li><a href="{{ site.repo_url }}" rel="noopener">GitHub</a></li>
      </ul>
    </div>
  </nav>

  <main class="site-main" role="main">
    <article class="prose container">
      {{ content }}
    </article>
  </main>

  <script src="{{ '/assets/js/factory.js' | relative_url }}" defer></script>

  <footer class="site-footer" role="contentinfo">
    <div class="container site-footer__inner">
      <div>
        <strong>Factory</strong> · the program home of
        <a href="https://pfactory.freundcloud.com/">PFactory</a> ·
        <a href="https://aifactory.freundcloud.com/">AIFactory</a> ·
        <a href="https://tfactory.freundcloud.com/">TFactory</a> ·
        <a href="https://github.com/olafkfreund/CFactory">CFactory</a>
      </div>
      <div class="site-footer__meta">
        Built with Jekyll · Hosted on GitHub Pages
      </div>
    </div>
  </footer>
</body>
</html>
