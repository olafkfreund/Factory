openapi: 3.0.3
info:
  title: CFactory Cockpit & Observer API
  version: 1.1.0
  description: |
    **CFactory — Review / Observe. The control tower.**

    CFactory threads each unit of work across PFactory → AIFactory → TFactory
    using a **WorkItem correlation store** keyed by the GitHub-issue correlation
    key. It ingests [RFC-0001](https://factory.freundcloud.com/rfc/correlation-key/)
    completion events (webhook or `COMPLETED.json` sentinel), aggregates spend
    from the v1.1 `usage` block, and drives an **advise-and-confirm copilot**:
    the agent *prepares* an action; a human must *confirm* before any write.

    Pure consumer of the other services' REST/WS APIs — no shared database.
    API on `:3110`; realtime stream on `:3111`.
  contact:
    name: Factory maintainers
    url: https://factory.freundcloud.com/
servers:
  - url: http://localhost:3110
    description: Cockpit API (canonical local dev)
  - url: http://localhost:3111
    description: Realtime stream
tags:
  - name: events
    description: Completion-event ingress (RFC-0001)
  - name: workitems
    description: The WorkItem correlation store and timeline
  - name: usage
    description: Aggregated spend
  - name: copilot
    description: Advise-and-confirm actions
  - name: realtime
    description: Live cockpit stream
paths:
  /api/events/completion:
    post:
      tags: [events]
      summary: Ingest a completion event (RFC-0001)
      description: >-
        The standardized webhook ingress. Accepts the normalized envelope and
        upserts it onto the WorkItem timeline keyed by `correlation_key`.
        Idempotent by `(service, correlation_key, status)`.
      operationId: ingestCompletionEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletionEvent'
      responses:
        '202':
          description: Accepted (best-effort, idempotent)
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/workitems:
    get:
      tags: [workitems]
      summary: List work items
      operationId: listWorkItems
      parameters:
        - name: project
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: A page of work items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkItem'
  /api/workitems/{correlationKey}:
    parameters:
      - $ref: '#/components/parameters/CorrelationKey'
    get:
      tags: [workitems]
      summary: Get a work item (aggregated across services)
      operationId: getWorkItem
      responses:
        '200':
          description: The aggregated work item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkItem'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/workitems/{correlationKey}/timeline:
    parameters:
      - $ref: '#/components/parameters/CorrelationKey'
    get:
      tags: [workitems]
      summary: Get the work item's event timeline
      operationId: getTimeline
      responses:
        '200':
          description: Ordered completion events for this unit of work
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CompletionEvent'
  /api/usage:
    get:
      tags: [usage]
      summary: Aggregated spend
      description: Sums the v1.1 `usage` blocks by service / project / work item.
      operationId: getUsage
      parameters:
        - name: group_by
          in: query
          schema:
            type: string
            enum: [service, project, workitem]
            default: service
      responses:
        '200':
          description: Aggregated spend rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsageRow'
  /api/copilot/actions:
    post:
      tags: [copilot]
      summary: Ask the copilot to prepare an action (advise)
      description: >-
        The copilot prepares (but does not execute) an action — e.g. retrigger a
        TFactory run, comment on a PR, nudge a handback. Returns a pending action
        a human must confirm.
      operationId: prepareAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdviseRequest'
      responses:
        '200':
          description: A prepared, unconfirmed action
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotAction'
  /api/copilot/actions/{actionId}/confirm:
    parameters:
      - name: actionId
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [copilot]
      summary: Confirm and execute a prepared action (human-in-the-loop)
      operationId: confirmAction
      responses:
        '200':
          description: Action executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotAction'
        '409':
          description: Action already executed or expired
  /ws/cockpit:
    get:
      tags: [realtime]
      summary: WebSocket — live cockpit stream (served on :3111)
      responses:
        '101':
          description: Switching Protocols (WebSocket)
components:
  parameters:
    CorrelationKey:
      name: correlationKey
      in: path
      required: true
      description: The shared key — GitHub issue number, or a synthetic `pf-/af-/tf-` key.
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    CompletionEvent:
      type: object
      required: [correlation_key, service, task_id, status, phase, updated_at]
      properties:
        correlation_key:
          type: string
          example: "142"
        service:
          type: string
          enum: [pfactory, aifactory, tfactory, cfactory]
        task_id:
          type: string
          example: 001-refund-flow
        status:
          type: string
          example: emitted
        phase:
          type: string
          example: emit
        updated_at:
          type: string
          format: date-time
        usage:
          $ref: '#/components/schemas/Usage'
        correlation:
          $ref: '#/components/schemas/CorrelationBlock'
    Usage:
      type: object
      description: RFC-0001 v1.1 optional usage block.
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        total_tokens:
          type: integer
        cost_usd:
          type: number
          format: double
        model:
          type: string
    CorrelationBlock:
      type: object
      description: Optional chain links so a consumer can stitch the thread.
      properties:
        session_id:
          type: string
        issue_number:
          type: integer
          nullable: true
        aifactory_task_id:
          type: string
          nullable: true
        branch:
          type: string
        pr_number:
          type: integer
        tfactory_spec_id:
          type: string
    WorkItem:
      type: object
      properties:
        correlation_key:
          type: string
        title:
          type: string
        project:
          type: string
        stages:
          type: object
          description: Latest status per service.
          properties:
            pfactory:
              type: string
            aifactory:
              type: string
            tfactory:
              type: string
        usage_total:
          $ref: '#/components/schemas/Usage'
        updated_at:
          type: string
          format: date-time
    UsageRow:
      type: object
      properties:
        key:
          type: string
          description: The group value (service / project / workitem).
        total_tokens:
          type: integer
        cost_usd:
          type: number
          format: double
    AdviseRequest:
      type: object
      required: [correlation_key, intent]
      properties:
        correlation_key:
          type: string
        intent:
          type: string
          example: Re-run TFactory on the latest commit
        prompt:
          type: string
    CopilotAction:
      type: object
      properties:
        id:
          type: string
        correlation_key:
          type: string
        summary:
          type: string
        target_service:
          type: string
          enum: [pfactory, aifactory, tfactory, github]
        status:
          type: string
          enum: [prepared, confirmed, executed, expired]
        preview:
          type: object
          additionalProperties: true
          description: What will happen if confirmed.
    Error:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string
