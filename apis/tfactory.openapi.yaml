openapi: 3.0.3
info:
  title: TFactory API
  version: 1.0.0
  description: |
    **TFactory — Reflect / Verify.**

    Autonomous test generation and execution. From a branch/PR plus acceptance
    criteria it runs **planner → gen-functional → executor (Docker sandbox) →
    evaluator → triager**. The evaluator grades each generated test on a
    **5-signal verdict** — coverage delta, stability (re-runs), mutation kills,
    lint, and semantic relevance — so a pass means *meaningful* tests, not a
    green bar. Lanes: `unit`, `browser`, `api`, `integration`, `mutation`.

    It posts a triage report to the PR and, on failure, routes a **handback** to
    AIFactory's QA fixer. On a terminal status it emits an
    [RFC-0001](https://factory.freundcloud.com/rfc/correlation-key/)
    completion event.
  contact:
    name: Factory maintainers
    url: https://factory.freundcloud.com/
servers:
  - url: http://localhost:3103
    description: Canonical local dev (backend)
tags:
  - name: specs
    description: Test specs and their lifecycle
  - name: verdict
    description: The 5-signal verdict and triage
  - name: handback
    description: Routing corrections back to AIFactory
  - name: realtime
    description: Live generation/execution progress
paths:
  /api/specs:
    post:
      tags: [specs]
      summary: Create a test spec for a branch/PR
      operationId: createSpec
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpecRequest'
      responses:
        '201':
          description: Spec created; generation queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Spec'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      tags: [specs]
      summary: List test specs
      operationId: listSpecs
      parameters:
        - name: correlation_key
          in: query
          schema:
            type: string
      responses:
        '200':
          description: A page of specs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Spec'
  /api/specs/{specId}:
    parameters:
      - $ref: '#/components/parameters/SpecId'
    get:
      tags: [specs]
      summary: Get a test spec (with verdict if available)
      operationId: getSpec
      responses:
        '200':
          description: The spec
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Spec'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/specs/{specId}/run:
    parameters:
      - $ref: '#/components/parameters/SpecId'
    post:
      tags: [specs]
      summary: Execute the generated suite in the sandbox
      operationId: runSpec
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                lanes:
                  type: array
                  items:
                    $ref: '#/components/schemas/Lane'
      responses:
        '202':
          description: Execution started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Spec'
  /api/specs/{specId}/report:
    parameters:
      - $ref: '#/components/parameters/SpecId'
    get:
      tags: [verdict]
      summary: Get the triage report
      operationId: getReport
      responses:
        '200':
          description: Triage report with the 5-signal verdict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriageReport'
  /api/handback:
    post:
      tags: [handback]
      summary: Route a correction back to AIFactory
      description: >-
        Posts the failing-test set to AIFactory's `/api/tasks/{id}/qa-fix`,
        closing the bounded QA loop.
      operationId: handback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HandbackRequest'
      responses:
        '202':
          description: Handback dispatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  aifactory_task_id:
                    type: string
                  accepted:
                    type: boolean
  /ws:
    get:
      tags: [realtime]
      summary: WebSocket — live generation/execution stream
      responses:
        '101':
          description: Switching Protocols (WebSocket)
components:
  parameters:
    SpecId:
      name: specId
      in: path
      required: true
      description: TFactory spec id (e.g. `spec-001`).
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Lane:
      type: string
      enum: [unit, browser, api, integration, mutation]
    SpecRequest:
      type: object
      required: [repo, branch]
      properties:
        repo:
          type: string
          example: olafkfreund/AIFactory
        branch:
          type: string
          example: af/142-refund-flow
        pr_number:
          type: integer
          nullable: true
        correlation_key:
          type: string
          example: "142"
        acceptance_criteria:
          type: array
          items:
            type: string
        lanes:
          type: array
          items:
            $ref: '#/components/schemas/Lane'
    Spec:
      type: object
      properties:
        spec_id:
          type: string
          example: spec-001
        correlation_key:
          type: string
          example: "142"
        status:
          type: string
          example: triaged
          description: e.g. planning, generating, executing, triaged, triaged_empty, triager_failed.
        phase:
          type: string
          example: test
        verdict:
          $ref: '#/components/schemas/Verdict'
        created_at:
          type: string
          format: date-time
    Verdict:
      type: object
      description: The 5-signal verdict; each signal contributes to pass/fail.
      properties:
        passed:
          type: boolean
        coverage_delta:
          type: number
          format: float
          description: Net coverage change introduced by the generated tests.
        stability:
          type: number
          format: float
          description: Fraction of re-runs that agreed (flake resistance).
        mutation_score:
          type: number
          format: float
          description: Fraction of injected mutants the suite killed.
        lint:
          type: string
          enum: [pass, warn, fail]
        semantic_relevance:
          type: number
          format: float
          description: How well tests map to the acceptance criteria.
    TriageReport:
      type: object
      properties:
        spec_id:
          type: string
        verdict:
          $ref: '#/components/schemas/Verdict'
        failing_tests:
          type: array
          items:
            type: string
        summary_markdown:
          type: string
          description: The report posted as a PR comment.
    HandbackRequest:
      type: object
      required: [correlation_key, failing_tests]
      properties:
        correlation_key:
          type: string
        spec_id:
          type: string
        failing_tests:
          type: array
          items:
            type: string
        report_url:
          type: string
          format: uri
    Error:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string
